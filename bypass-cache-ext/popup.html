<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cache Bypass</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1>Cache Bypass</h1>
        <label class="toggle">
          <input id="allMode" type="checkbox" />
          <span>全URLモード</span>
        </label>
      </header>

      <section class="panel">
        <label class="field">
          <span>ドメイン/URLを追加</span>
          <input id="domainInput" type="text" placeholder="example.com または https://example.com" />
        </label>
        <div class="actions">
          <button id="addDomain" type="button">追加</button>
          <button id="addCurrent" type="button">現在のサイトを追加</button>
        </div>
        <p id="status" class="status" aria-live="polite"></p>
      </section>

      <section class="panel">
        <h2>登録済みドメイン</h2>
        <ul id="domainList" class="list"></ul>
      </section>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
